# ppgen 헤드리스 생성기를 플랫폼별로 크로스컴파일해 GitHub Release 에 첨부한다.
# 스킬의 install.sh 가 이 자산(ppgen-<os>-<arch>)을 다운로드해 Go 없이 설치한다.
#
# 트리거: v* 태그 push (예: git tag v1.0.0 && git push --tags)
#         또는 수동 실행(workflow_dispatch).
name: release-ppgen

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: darwin, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build ppgen
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          out="ppgen-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w" -o "$out" ./cmd/ppgen
          ls -la "$out"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ppgen-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ppgen-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ppgen-*
          generate_release_notes: true
